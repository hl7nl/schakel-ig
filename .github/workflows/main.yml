name: Build and publish FHIR IG

on:
  push:
    branches:
      - 0.1.0-dev
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Cache FHIR package cache
        uses: actions/cache@v4
        with:
          path: ~/.fhir
          key: fhir-cache-${{ runner.os }}-${{ hashFiles('**/ig.ini') }}
          restore-keys: |
            fhir-cache-${{ runner.os }}-

      - name: Install SUSHI
        run: npm install -g fsh-sushi

      - name: Download IG Publisher
        run: |
          mkdir -p tooling
          curl -L https://github.com/HL7/fhir-ig-publisher/releases/latest/download/publisher.jar \
            -o tooling/publisher.jar

      - name: Run IG Publisher
        run: |
          java -Xmx4g -jar tooling/publisher.jar ig.ini

      - name: Publish to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: ./output